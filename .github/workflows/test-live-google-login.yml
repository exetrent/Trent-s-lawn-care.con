name: Test live Studio Google login

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/test-live-google-login.yml

permissions:
  contents: write

jobs:
  test-login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install browser tester
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1

      - name: Test live Google button
        run: |
          cat > /tmp/test-login.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const report = {
            checkedAt: new Date().toISOString(),
            pageLoaded: false,
            expectedVersionLoaded: false,
            buttonVisible: false,
            buttonEnabled: false,
            statusBeforeClick: '',
            popupOpened: false,
            popupUrl: '',
            googlePageReached: false,
            consoleErrors: [],
            pageErrors: [],
            requestFailures: [],
            finalStatus: '',
            error: null,
            verified: false
          };

          const browser = await chromium.launch({ headless: true });
          const context = await browser.newContext({
            viewport: { width: 1280, height: 900 },
            ignoreHTTPSErrors: false
          });
          const page = await context.newPage();

          page.on('console', msg => {
            if (msg.type() === 'error') report.consoleErrors.push(msg.text());
          });
          page.on('pageerror', error => report.pageErrors.push(error.message));
          page.on('requestfailed', request => {
            report.requestFailures.push(`${request.url()} :: ${request.failure()?.errorText || 'failed'}`);
          });

          try {
            const url = `https://trentslawncare.com/studio-v2.html?login-test=${Date.now()}`;
            const response = await page.goto(url, { waitUntil: 'networkidle', timeout: 90000 });
            report.pageLoaded = Boolean(response?.ok());

            await page.waitForFunction(() => window.__TRENT_STUDIO_VERSION__ === '20260724-9', null, { timeout: 30000 });
            report.expectedVersionLoaded = true;

            const button = page.locator('#signIn');
            await button.waitFor({ state: 'visible', timeout: 30000 });
            report.buttonVisible = true;
            report.buttonEnabled = await button.isEnabled();
            report.statusBeforeClick = (await page.locator('#loginStatus').textContent()) || '';

            const popupPromise = page.waitForEvent('popup', { timeout: 30000 }).catch(() => null);
            await button.click();
            const popup = await popupPromise;

            if (popup) {
              report.popupOpened = true;
              await popup.waitForLoadState('domcontentloaded', { timeout: 30000 }).catch(() => {});
              report.popupUrl = popup.url();
              report.googlePageReached = /accounts\.google\.com|firebaseapp\.com\/__/i.test(report.popupUrl);
              await popup.close().catch(() => {});
            }

            await page.waitForTimeout(2000);
            report.finalStatus = (await page.locator('#loginStatus').textContent()) || '';
            report.verified = report.pageLoaded && report.expectedVersionLoaded && report.buttonVisible && report.buttonEnabled && report.popupOpened && report.googlePageReached && report.pageErrors.length === 0;
          } catch (error) {
            report.error = `${error.name}: ${error.message}`;
            try {
              report.finalStatus = (await page.locator('#loginStatus').textContent()) || '';
            } catch {}
          } finally {
            await browser.close();
          }

          fs.writeFileSync('studio-live-login-test.json', JSON.stringify(report, null, 2) + '\n');
          console.log(JSON.stringify(report, null, 2));
          JS

          node /tmp/test-login.mjs

      - name: Save browser test result
        run: |
          git config user.name "Trent Lawn Care Website"
          git config user.email "actions@users.noreply.github.com"
          git add studio-live-login-test.json
          if git diff --cached --quiet; then
            echo "Login test report is unchanged."
          else
            git commit -m "Update live Studio login browser test"
            git push
          fi
