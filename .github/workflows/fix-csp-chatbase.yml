name: Replace eval-dependent chat embed

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-csp-chatbase.yml

permissions:
  contents: write

jobs:
  fix-csp-chat:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4

      - name: Replace Chatbase script with CSP-safe iframe
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          marker = "<!-- CSP-SAFE-CHATBASE-IFRAME-2026-07-24 -->"

          if marker in html:
              print("CSP-safe Chatbase iframe already installed.")
              raise SystemExit(0)

          pattern = re.compile(
              r'<script>\s*\(function\(\)\{if\(!window\.chatbase.*?https://www\.chatbase\.co/embed\.min\.js.*?</script>',
              re.DOTALL,
          )

          replacement = r'''<!-- CSP-SAFE-CHATBASE-IFRAME-2026-07-24 -->
          <style>
          .trent-ai-shell{
            position:fixed!important;
            right:18px;
            bottom:18px;
            z-index:9999;
            margin:0!important;
            padding:0!important;
            border:0!important;
            background:transparent!important;
            color:#fff!important;
            box-shadow:none!important;
          }
          .trent-ai-shell>summary{
            list-style:none;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:52px;
            padding:12px 18px;
            border:2px solid #c9ef57;
            border-radius:999px;
            background:#0b4a2d;
            color:#fff!important;
            font-weight:950;
            cursor:pointer;
            box-shadow:0 12px 34px rgba(0,0,0,.34);
            user-select:none;
          }
          .trent-ai-shell>summary::-webkit-details-marker{display:none}
          .trent-ai-shell>summary::before{content:"✦";margin-right:8px;color:#c9ef57}
          .trent-ai-shell[open]>summary{
            position:absolute;
            top:10px;
            right:10px;
            z-index:2;
            width:42px;
            min-height:42px;
            padding:0;
            border-radius:50%;
            font-size:0;
          }
          .trent-ai-shell[open]>summary::before{
            content:"×";
            margin:0;
            color:#fff;
            font-size:30px;
            line-height:1;
          }
          .trent-ai-window{
            width:min(390px,calc(100vw - 24px));
            height:min(620px,calc(100vh - 92px));
            overflow:hidden;
            border:2px solid #c9ef57;
            border-radius:22px;
            background:#fff;
            box-shadow:0 22px 65px rgba(0,0,0,.46);
          }
          .trent-ai-window iframe{
            display:block;
            width:100%;
            height:100%;
            border:0;
            background:#fff;
          }
          @media(max-width:600px){
            .trent-ai-shell{right:8px;bottom:8px}
            .trent-ai-window{width:calc(100vw - 16px);height:calc(100vh - 76px);border-radius:18px}
          }
          </style>
          <details class="trent-ai-shell">
            <summary aria-label="Open or close Trent's Lawn Care AI assistant">Ask Trent's AI</summary>
            <div class="trent-ai-window">
              <iframe
                src="https://www.chatbase.co/chatbot-iframe/UXhr7fcUGsCb-IP_Hj1w4"
                title="Trent's Lawn Care AI assistant"
                loading="lazy"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="clipboard-write">
              </iframe>
            </div>
          </details>'''

          updated, count = pattern.subn(replacement, html, count=1)
          if count != 1:
              raise SystemExit("Could not find the existing Chatbase embed script; index.html was not changed.")

          path.write_text(updated, encoding="utf-8")
          print("Replaced the Chatbase JavaScript embed with a CSP-safe iframe.")

      - name: Commit CSP fix
        run: |
          git config user.name "Trent Lawn Care Website"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No CSP changes were needed."
          else
            git commit -m "Replace Chatbase script with CSP-safe iframe"
            git push
          fi
