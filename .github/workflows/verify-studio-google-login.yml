name: Verify Studio Google login

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - studio-v2.html
      - studio-v2.js
      - studio-v2-auth.js
      - .github/workflows/verify-studio-google-login.yml

permissions:
  contents: write

jobs:
  verify-login:
    runs-on: ubuntu-latest
    steps:
      - name: Check out website
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          node --check studio-v2-auth.js
          node --check studio-v2.js

      - name: Verify Firebase Google provider and live deployment
        shell: python
        run: |
          import json
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          api_key = "AIzaSyCdTFyZoBAKfO0L5ZAZ-IP4cqltnlEs1l4"
          provider_endpoint = f"https://identitytoolkit.googleapis.com/v1/accounts:createAuthUri?key={api_key}"
          expected_version = "20260724-8"
          live_page = "https://trentslawncare.com/studio-v2.html"
          live_loader = f"https://trentslawncare.com/studio-v2.js?v={expected_version}"
          live_auth = f"https://trentslawncare.com/studio-v2-auth.js?v={expected_version}"

          report = {
              "checkedAt": datetime.now(timezone.utc).isoformat(),
              "javascriptSyntaxValid": True,
              "firebaseGoogleProviderReady": False,
              "livePageUpdated": False,
              "liveLoaderUpdated": False,
              "liveAuthUpdated": False,
              "expectedVersion": expected_version,
              "error": None,
          }

          try:
              body = json.dumps({
                  "providerId": "google.com",
                  "continueUri": live_page,
                  "customParameter": {"prompt": "select_account"},
              }).encode("utf-8")
              request = urllib.request.Request(
                  provider_endpoint,
                  data=body,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(request, timeout=25) as response:
                  payload = json.load(response)
              report["firebaseGoogleProviderReady"] = bool(payload.get("authUri"))

              last_error = None
              for _ in range(24):
                  try:
                      page_text = urllib.request.urlopen(live_page, timeout=20).read().decode("utf-8", "replace")
                      loader_text = urllib.request.urlopen(live_loader, timeout=20).read().decode("utf-8", "replace")
                      auth_text = urllib.request.urlopen(live_auth, timeout=20).read().decode("utf-8", "replace")

                      report["livePageUpdated"] = f"studio-v2.js?v={expected_version}" in page_text
                      report["liveLoaderUpdated"] = f"studio-v2-auth.js?v={expected_version}" in loader_text
                      report["liveAuthUpdated"] = (
                          "signInWithPopup" in auth_text
                          and "browserLocalPersistence" in auth_text
                          and "Opening the secure Google account window" in auth_text
                      )

                      if report["livePageUpdated"] and report["liveLoaderUpdated"] and report["liveAuthUpdated"]:
                          break
                  except Exception as error:
                      last_error = error

                  time.sleep(15)

              if not (report["livePageUpdated"] and report["liveLoaderUpdated"] and report["liveAuthUpdated"]):
                  report["error"] = f"Live deployment did not update before timeout: {last_error or 'version markers missing'}"
          except Exception as error:
              report["error"] = f"{type(error).__name__}: {error}"

          report["verified"] = all([
              report["javascriptSyntaxValid"],
              report["firebaseGoogleProviderReady"],
              report["livePageUpdated"],
              report["liveLoaderUpdated"],
              report["liveAuthUpdated"],
          ])

          Path("studio-login-verification.json").write_text(
              json.dumps(report, indent=2) + "\n",
              encoding="utf-8",
          )

          print(json.dumps(report, indent=2))

          if not report["verified"]:
              raise SystemExit("Studio Google login verification failed")

      - name: Save verification result
        if: always()
        run: |
          git config user.name "Trent Lawn Care Website"
          git config user.email "actions@users.noreply.github.com"
          git add studio-login-verification.json
          if git diff --cached --quiet; then
            echo "Verification report is unchanged."
          else
            git commit -m "Update Studio Google login verification"
            git push
          fi
