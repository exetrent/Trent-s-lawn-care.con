<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Request Received | Trent's Lawn Care</title>
<style>
:root{color-scheme:dark;--ink:#062112;--lime:#d8ff63;--mint:#63ff83}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at 15% 10%,rgba(216,255,99,.14),transparent 28%),linear-gradient(135deg,#03160a,#0b4222);color:#fff}
.card{width:min(660px,100%);padding:clamp(28px,6vw,58px);border:1px solid rgba(216,255,99,.5);border-radius:32px;background:rgba(3,24,12,.78);box-shadow:0 30px 90px rgba(0,0,0,.35);text-align:center;backdrop-filter:blur(12px)}
.check{display:grid;place-items:center;width:74px;height:74px;margin:0 auto 22px;border-radius:50%;color:var(--ink);background:linear-gradient(135deg,var(--lime),var(--mint));font-size:2rem;font-weight:950;box-shadow:0 0 32px rgba(126,255,114,.45)}
h1{margin:0 0 14px;font-size:clamp(2.3rem,7vw,4.5rem);line-height:.92;letter-spacing:-.06em}p{color:rgba(255,255,255,.8);font-size:1.05rem;line-height:1.6}.next{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:28px}a{display:inline-flex;padding:14px 18px;border-radius:999px;text-decoration:none;font-weight:900}a.primary{background:var(--lime);color:var(--ink)}a.secondary{border:1px solid rgba(255,255,255,.3);color:#fff}
</style>
</head>
<body>
<main class="card">
  <div class="check">✓</div>
  <h1>Request received.</h1>
  <p>Thanks for contacting the official Trent's Lawn Care website. Trent will review your lawn details, requested day, and any uploaded photo, then reply with availability and pricing.</p>
  <div class="next"><a class="primary" href="https://trentslawncare.com/#quote">Send another request</a><a class="secondary" href="tel:+15028358658">Call (502) 835-8658</a></div>
</main>
</body>
</html>
